<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radius Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.16);
    --text: #f0f2ff;
    --muted: #7c8099;
    --accent: #4f8ef7;
    --accent2: #7cb4fa;
    --accent-glow: rgba(79,142,247,0.25);
    --danger: #f76f6f;
    --success: #5ecfa0;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
    z-index: 1000;
  }

  .logo {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo svg { width: 18px; height: 18px; fill: white; }

  header h1 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  header span {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
  }

  .layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  .panel {
    width: 320px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    flex-shrink: 0;
  }

  .section {
    padding: 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    padding: 10px 40px 10px 12px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted); }

  .search-btn {
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    background: var(--accent);
    border: none;
    border-radius: 6px;
    color: white;
    cursor: pointer;
    padding: 4px 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: opacity 0.2s;
  }

  .search-btn:hover { opacity: 0.85; }
  .search-btn svg { width: 14px; height: 14px; fill: white; }

  .suggestions {
    position: absolute;
    top: calc(100% + 4px);
    left: 0;
    right: 0;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    z-index: 9999;
    max-height: 180px;
    overflow-y: auto;
    display: none;
  }

  .suggestion-item {
    padding: 9px 12px;
    font-size: 12px;
    cursor: pointer;
    color: var(--text);
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
    line-height: 1.4;
  }

  .suggestion-item:last-child { border-bottom: none; }
  .suggestion-item:hover { background: rgba(79,142,247,0.1); }

  .radius-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }

  .radius-value {
    font-family: 'DM Mono', monospace;
    font-size: 22px;
    font-weight: 500;
    color: var(--accent2);
    min-width: 60px;
  }

  .unit-toggle {
    display: flex;
    gap: 4px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 3px;
  }

  .unit-btn {
    font-family: inherit;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.2s;
    background: transparent;
    color: var(--muted);
  }

  .unit-btn.active {
    background: var(--accent);
    color: white;
  }

  input[type=range] {
    -webkit-appearance: none;
    width: 100%;
    height: 4px;
    border-radius: 2px;
    background: var(--surface2);
    outline: none;
    margin: 6px 0 2px;
  }

  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    border: 2px solid var(--bg);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }

  .range-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
  }

  .color-options {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s;
  }

  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.active { border-color: white; }

  .opacity-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 8px;
  }

  .opacity-label {
    font-size: 12px;
    color: var(--muted);
    width: 60px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .stat-card {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    border: 1px solid var(--border);
  }

  .stat-card .label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 4px;
  }

  .stat-card .value {
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    color: var(--accent2);
  }

  .coords-box {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    border: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
    line-height: 1.7;
  }

  .status-bar {
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
    min-height: 16px;
  }

  .status-bar.error { color: var(--danger); }
  .status-bar.success { color: var(--success); }
  .status-bar.loading { color: var(--accent); }

  .export-btn {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-sm);
    color: var(--text);
    font-family: inherit;
    font-size: 12px;
    font-weight: 500;
    padding: 9px 12px;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: border-color 0.2s, background 0.2s;
    margin-bottom: 6px;
  }

  .export-btn:hover { border-color: var(--accent); background: rgba(79,142,247,0.05); }
  .export-btn svg { width: 14px; height: 14px; opacity: 0.6; }

  #map {
    flex: 1;
    z-index: 1;
  }



  .crosshair-btn {
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: inherit;
    font-size: 11px;
    padding: 7px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    transition: border-color 0.2s;
    margin-top: 8px;
    width: 100%;
    justify-content: center;
  }

  .crosshair-btn:hover { border-color: var(--accent); }
  .crosshair-btn.active { border-color: var(--accent); background: var(--accent-glow); }

  .leaflet-control-zoom a {
    background: var(--surface) !important;
    color: var(--text) !important;
    border-color: var(--border2) !important;
  }

  .leaflet-control-zoom a:hover {
    background: var(--surface2) !important;
  }

  .loading-spinner {
    display: none;
    width: 12px;
    height: 12px;
    border: 2px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
  </div>
  <h1>Radius Map</h1>
  <span>Powered by OpenStreetMap · No API key required</span>
</header>

<div class="layout">
  <div class="panel">

    <div class="section">
      <div class="section-label">Address</div>
      <div class="search-wrap">
        <input type="text" id="address-input" placeholder="Enter any address…" autocomplete="off">
        <button class="search-btn" id="search-btn" onclick="searchAddress()">
          <div class="loading-spinner" id="spinner"></div>
          <svg id="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </button>
        <div class="suggestions" id="suggestions"></div>
      </div>
      <div class="status-bar" id="status"></div>
      <button class="crosshair-btn" id="click-mode-btn" onclick="toggleClickMode()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0 0 13 3.06V1h-2v2.06A8.994 8.994 0 0 0 3.06 11H1v2h2.06A8.994 8.994 0 0 0 11 20.94V23h2v-2.06A8.994 8.994 0 0 0 20.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
        Click map to set center
      </button>
    </div>

    <div class="section">
      <div class="section-label">Radius</div>
      <div class="radius-row">
        <div class="radius-value" id="radius-display">5.0</div>
        <div class="unit-toggle">
          <button class="unit-btn active" id="btn-mi" onclick="setUnit('mi')">mi</button>
          <button class="unit-btn" id="btn-km" onclick="setUnit('km')">km</button>
        </div>
      </div>
      <input type="range" id="radius-slider" min="0.1" max="50" step="0.1" value="5">
      <div class="range-labels"><span>0.1</span><span>25</span><span>50</span></div>
    </div>

    <div class="section">
      <div class="section-label">Appearance</div>
      <div class="color-options" id="color-options"></div>
      <div class="opacity-row">
        <span class="opacity-label">Fill opacity</span>
        <input type="range" id="opacity-slider" min="0" max="40" step="1" value="15" style="flex:1;">
        <span style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);width:30px;text-align:right;" id="opacity-val">15%</span>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Statistics</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="label">Radius</div>
          <div class="value" id="stat-radius">—</div>
        </div>
        <div class="stat-card">
          <div class="label">Diameter</div>
          <div class="value" id="stat-diameter">—</div>
        </div>
        <div class="stat-card">
          <div class="label">Area (mi²)</div>
          <div class="value" id="stat-area-mi">—</div>
        </div>
        <div class="stat-card">
          <div class="label">Area (km²)</div>
          <div class="value" id="stat-area-km">—</div>
        </div>
      </div>
      <div class="coords-box" id="coords-box">
        Lat: —&nbsp;&nbsp;Lng: —
      </div>
    </div>

    <div class="section">
      <div class="section-label">Export</div>
      <button class="export-btn" onclick="copyCoords()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        Copy coordinates
      </button>
      <button class="export-btn" onclick="exportData()">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
        Download as JSON
      </button>
    </div>

  </div>

  <div id="map"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
const COLORS = [
  { hex: '#4f8ef7', name: 'Blue' },
  { hex: '#5ecfa0', name: 'Green' },
  { hex: '#f76f6f', name: 'Red' },
  { hex: '#f5a623', name: 'Amber' },
  { hex: '#b06ef7', name: 'Purple' },
  { hex: '#f76fb8', name: 'Pink' },
  { hex: '#6fc4f7', name: 'Cyan' },
  { hex: '#f7e76f', name: 'Yellow' },
];

let map, circle, marker;
let currentLat = 39.7392, currentLng = -104.9903;
let currentUnit = 'mi';
let currentColor = '#4f8ef7';
let currentOpacity = 0.15;
let clickModeActive = false;
let debounceTimer;

function initMap() {
  map = L.map('map', { zoomControl: true }).setView([currentLat, currentLng], 11);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(map);

  drawCircle();

  map.on('click', function(e) {
    if (!clickModeActive) return;
    currentLat = e.latlng.lat;
    currentLng = e.latlng.lng;
    drawCircle();
    updateStats();
    setStatus('Center set by click', 'success');
  });
}

function getRadiusMeters() {
  const val = parseFloat(document.getElementById('radius-slider').value);
  return currentUnit === 'mi' ? val * 1609.344 : val * 1000;
}

function getRadiusDisplay() {
  return parseFloat(document.getElementById('radius-slider').value).toFixed(1);
}

function drawCircle() {
  if (circle) map.removeLayer(circle);
  if (marker) map.removeLayer(marker);

  const radiusM = getRadiusMeters();

  circle = L.circle([currentLat, currentLng], {
    radius: radiusM,
    color: currentColor,
    weight: 2,
    opacity: 0.9,
    fillColor: currentColor,
    fillOpacity: currentOpacity
  }).addTo(map);

  const icon = L.divIcon({
    className: '',
    html: `<div style="width:12px;height:12px;border-radius:50%;background:${currentColor};border:2px solid #fff;box-shadow:0 0 0 2px ${currentColor};"></div>`,
    iconSize: [12, 12],
    iconAnchor: [6, 6]
  });

  marker = L.marker([currentLat, currentLng], { icon }).addTo(map);
  map.flyToBounds(circle.getBounds(), { padding: [40, 40], duration: 0.8, maxZoom: 15 });

  document.getElementById('coords-box').innerHTML =
    `Lat: <b style="color:var(--text)">${currentLat.toFixed(6)}</b>&nbsp;&nbsp;Lng: <b style="color:var(--text)">${currentLng.toFixed(6)}</b>`;

  updateStats();
}

function updateStats() {
  const val = parseFloat(document.getElementById('radius-slider').value);
  const unit = currentUnit;
  const radiusMi = unit === 'mi' ? val : val / 1.60934;
  const radiusKm = unit === 'km' ? val : val * 1.60934;
  const areaMi = Math.PI * radiusMi * radiusMi;
  const areaKm = Math.PI * radiusKm * radiusKm;
  document.getElementById('stat-radius').textContent = val.toFixed(1) + ' ' + unit;
  document.getElementById('stat-diameter').textContent = (val * 2).toFixed(1) + ' ' + unit;
  document.getElementById('stat-area-mi').textContent = areaMi.toFixed(2);
  document.getElementById('stat-area-km').textContent = areaKm.toFixed(2);
  document.getElementById('radius-display').textContent = val.toFixed(1);
}

function setUnit(u) {
  const slider = document.getElementById('radius-slider');
  const cur = parseFloat(slider.value);
  if (u === currentUnit) return;
  currentUnit = u;
  if (u === 'km') {
    slider.value = (cur * 1.60934).toFixed(1);
    slider.max = 80;
  } else {
    slider.value = (cur / 1.60934).toFixed(1);
    slider.max = 50;
  }
  document.getElementById('btn-mi').classList.toggle('active', u === 'mi');
  document.getElementById('btn-km').classList.toggle('active', u === 'km');
  drawCircle();
}

document.getElementById('radius-slider').addEventListener('input', function() {
  drawCircle();
});

document.getElementById('opacity-slider').addEventListener('input', function() {
  currentOpacity = parseInt(this.value) / 100;
  document.getElementById('opacity-val').textContent = this.value + '%';
  if (circle) circle.setStyle({ fillOpacity: currentOpacity });
});

function buildColorOptions() {
  const container = document.getElementById('color-options');
  COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (c.hex === currentColor ? ' active' : '');
    sw.style.background = c.hex;
    sw.title = c.name;
    sw.onclick = () => {
      currentColor = c.hex;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      drawCircle();
    };
    container.appendChild(sw);
  });
}

function setStatus(msg, type = '') {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status-bar ' + type;
}

async function searchAddress() {
  const query = document.getElementById('address-input').value.trim();
  if (!query) return;
  setStatus('Searching…', 'loading');
  document.getElementById('search-icon').style.display = 'none';
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('suggestions').style.display = 'none';
  try {
    const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`;
    const resp = await fetch(url, { headers: { 'Accept-Language': 'en' } });
    const data = await resp.json();
    if (!data.length) { setStatus('No results found', 'error'); return; }
    if (data.length === 1) {
      applyResult(data[0]);
    } else {
      showSuggestions(data);
    }
  } catch(e) {
    setStatus('Network error — check connection', 'error');
  } finally {
    document.getElementById('search-icon').style.display = 'block';
    document.getElementById('spinner').style.display = 'none';
  }
}

function applyResult(r) {
  currentLat = parseFloat(r.lat);
  currentLng = parseFloat(r.lon);
  document.getElementById('address-input').value = r.display_name.split(',').slice(0,3).join(',');
  document.getElementById('suggestions').style.display = 'none';
  setStatus('Found: ' + r.display_name.split(',').slice(0,2).join(','), 'success');
  drawCircle();
}

function showSuggestions(results) {
  const box = document.getElementById('suggestions');
  box.innerHTML = '';
  results.forEach(r => {
    const item = document.createElement('div');
    item.className = 'suggestion-item';
    item.textContent = r.display_name;
    item.onclick = () => applyResult(r);
    box.appendChild(item);
  });
  box.style.display = 'block';
  setStatus('Multiple results — pick one', '');
}

document.getElementById('address-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') searchAddress();
});

document.getElementById('address-input').addEventListener('input', function() {
  clearTimeout(debounceTimer);
  const q = this.value.trim();
  if (q.length < 3) { document.getElementById('suggestions').style.display = 'none'; return; }
  debounceTimer = setTimeout(async () => {
    try {
      const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=4`;
      const resp = await fetch(url, { headers: { 'Accept-Language': 'en' } });
      const data = await resp.json();
      if (data.length) showSuggestions(data);
    } catch {}
  }, 400);
});

document.addEventListener('click', function(e) {
  if (!document.getElementById('suggestions').contains(e.target) &&
      !document.getElementById('address-input').contains(e.target)) {
    document.getElementById('suggestions').style.display = 'none';
  }
});

function toggleClickMode() {
  clickModeActive = !clickModeActive;
  const btn = document.getElementById('click-mode-btn');
  btn.classList.toggle('active', clickModeActive);
  btn.querySelector('span') && (btn.querySelector('span').textContent = '');
  map.getContainer().style.cursor = clickModeActive ? 'crosshair' : '';
  if (clickModeActive) setStatus('Click anywhere on the map to set center', 'loading');
  else setStatus('', '');
}

function copyCoords() {
  const txt = `${currentLat.toFixed(6)}, ${currentLng.toFixed(6)}`;
  navigator.clipboard.writeText(txt).then(() => setStatus('Coordinates copied!', 'success'));
}

function exportData() {
  const val = parseFloat(document.getElementById('radius-slider').value);
  const data = {
    center: { lat: currentLat, lng: currentLng },
    radius: { value: val, unit: currentUnit },
    radius_meters: getRadiusMeters(),
    address: document.getElementById('address-input').value || null,
    generated: new Date().toISOString()
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'radius-map.json';
  a.click();
}

buildColorOptions();
initMap();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radius Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="redesign.css">
</head>
<body>

<!-- Hidden sliders — existing JS reads these -->
<div style="display:none">
  <input type="range" id="radius-slider" min="0.1" max="50" step="0.1" value="5">
  <input type="range" id="radius-slider-2" min="0.1" max="50" step="0.1" value="10">
  <input type="range" id="opacity-slider" min="0" max="40" step="1" value="15">
  <div id="status"></div>
  <div id="color-options"></div>
  <div id="pin-list"></div>
  <div id="qr-container"></div>
  <div id="opacity-val">15%</div>
  <div id="radius-display">5.0</div>
  <div id="stat-radius">—</div>
  <div id="stat-diameter">—</div>
  <div id="stat-area-mi">—</div>
  <div id="stat-area-km">—</div>
  <div id="stat-perimeter">—</div>
  <div id="stat-second">—</div>
  <div id="coords-box"></div>
  <div id="elevation-box"></div>
  <div id="radius-display-2">2.5</div>
  <div id="radius-unit-2">mi</div>
  <div id="preset-row"></div>
</div>

<div id="map">
  <!-- Floating Search Bar -->
  <div id="search-bar" data-keep-open>
    <input id="address-input" type="text" placeholder="Address or lat, lng coordinates…" autocomplete="off">
    <button id="search-clear" style="display:none">&times;</button>
    <button id="search-btn">&#8981;</button>
    <div id="suggestions"></div>
  </div>

  <!-- FAB Stack -->
  <div id="fab-stack" data-keep-open>
    <div class="fab fab-active" id="fab-radius" role="button" tabindex="0">&#8857;</div>
    <div class="fab" id="fab-tools" role="button" tabindex="0">&#128295;</div>
    <div class="fab" id="fab-style" role="button" tabindex="0">&#128506;</div>
    <div class="fab" id="fab-settings" role="button" tabindex="0">&#9881;</div>
  </div>

  <!-- Popovers -->
  <div class="popover" id="pop-radius" data-keep-open style="top:12px;"></div>
  <div class="popover" id="pop-tools" data-keep-open style="top:64px;"></div>
  <div class="popover" id="pop-style" data-keep-open style="top:116px;"></div>
  <div class="popover" id="pop-settings" data-keep-open style="top:168px;"></div>

  <!-- Stats HUD -->
  <div id="stats-hud">
    <div class="hud-stat"><span class="hud-val" id="hud-radius">—</span><span class="hud-key">Radius</span></div>
    <div class="hud-stat"><span class="hud-val" id="hud-diameter">—</span><span class="hud-key">Diameter</span></div>
    <div class="hud-stat"><span class="hud-val" id="hud-area-mi">—</span><span class="hud-key">Area mi²</span></div>
    <div class="hud-stat"><span class="hud-val" id="hud-area-km">—</span><span class="hud-key">Area km²</span></div>
    <div class="hud-stat"><span class="hud-val" id="hud-perim">—</span><span class="hud-key">Perimeter</span></div>
    <div class="hud-stat"><span class="hud-val" id="hud-elev">—</span><span class="hud-key">Elevation</span></div>
    <div class="hud-stat"><span class="hud-val" id="hud-ring2">—</span><span class="hud-key">2nd Ring</span></div>
  </div>

  <!-- Coordinates label -->
  <div id="coords-label">Lat: — &nbsp; Lng: —</div>
</div>

<script src="config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="app.js" defer></script>
<script src="tools.js" defer></script>
<script src="ui.js" defer></script>
</body>
</html>

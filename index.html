<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radius Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
  </div>
  <h1>Radius Map</h1>
  <div class="header-search">
    <div class="search-wrap">
      <input type="text" id="address-input" placeholder="Search any address…" autocomplete="off">
      <button class="search-btn" id="search-btn" onclick="searchAddress()">
        <div class="loading-spinner" id="spinner"></div>
        <svg id="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </button>
      <div class="suggestions" id="suggestions"></div>
    </div>
  </div>
  <button class="gear-btn" onclick="toggleModal()" aria-label="Settings">
    <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.49.49 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 0 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1 1 12 8.4a3.6 3.6 0 0 1 0 7.2z"/></svg>
  </button>
</header>

<div class="layout">
  <div class="panel">

    <div class="drawer-handle" onclick="toggleDrawer()"><span>Controls</span></div>

    <div class="section">
      <div class="section-label">Tools</div>
      <div class="status-bar" id="status"></div>
      <button class="crosshair-btn" id="click-mode-btn" onclick="toggleClickMode()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 8c-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4-1.79-4-4-4zm8.94 3A8.994 8.994 0 0 0 13 3.06V1h-2v2.06A8.994 8.994 0 0 0 3.06 11H1v2h2.06A8.994 8.994 0 0 0 11 20.94V23h2v-2.06A8.994 8.994 0 0 0 20.94 13H23v-2h-2.06zM12 19c-3.87 0-7-3.13-7-7s3.13-7 7-7 7 3.13 7 7-3.13 7-7 7z"/></svg>
        Click map to set center
      </button>
      <button class="crosshair-btn" id="distance-mode-btn" onclick="toggleDistanceMode()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M21.59 11.59l-9.17-9.17a2 2 0 0 0-2.83 0L2.41 9.59a2 2 0 0 0 0 2.83l9.17 9.17a2 2 0 0 0 2.83 0l7.18-7.17a2 2 0 0 0 0-2.83zM13 17l-2-2 1.5-1.5L14 15l1.5-1.5L17 15l-2 2-1-1-1 1z"/></svg>
        Measure distance
      </button>
    </div>

    <div class="section">
      <div class="section-label">Radius</div>
      <div class="radius-row">
        <div class="radius-value" id="radius-display">5.0</div>
        <div class="unit-toggle">
          <button class="unit-btn active" id="btn-mi" onclick="setUnit('mi')">mi</button>
          <button class="unit-btn" id="btn-km" onclick="setUnit('km')">km</button>
        </div>
      </div>
      <input type="range" id="radius-slider" min="0.1" max="50" step="0.1" value="5">
      <div class="range-labels"><span>0.1</span><span>25</span><span>50</span></div>
      <div class="preset-row" id="preset-row"></div>
    </div>

    <div class="section">
      <div class="section-label">Map style</div>
      <div class="tile-row">
        <button class="tile-btn active" data-tile="street" onclick="setTileLayer('street')">Street</button>
        <button class="tile-btn" data-tile="satellite" onclick="setTileLayer('satellite')">Satellite</button>
        <button class="tile-btn" data-tile="topo" onclick="setTileLayer('topo')">Topo</button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Statistics</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="label">Radius</div>
          <div class="value" id="stat-radius">—</div>
        </div>
        <div class="stat-card">
          <div class="label">Diameter</div>
          <div class="value" id="stat-diameter">—</div>
        </div>
        <div class="stat-card">
          <div class="label">Area (mi²)</div>
          <div class="value" id="stat-area-mi">—</div>
        </div>
        <div class="stat-card">
          <div class="label">Area (km²)</div>
          <div class="value" id="stat-area-km">—</div>
        </div>
      </div>
      <div class="coords-box" id="coords-box">
        Lat: —&nbsp;&nbsp;Lng: —
      </div>
    </div>

  </div>

  <div id="map"></div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="toggleModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h2>Settings</h2>
      <button class="modal-close" onclick="toggleModal()" aria-label="Close">&times;</button>
    </div>
    <div class="modal-tabs">
      <button class="modal-tab active" data-tab="appearance" onclick="switchTab('appearance')">Appearance</button>
      <button class="modal-tab" data-tab="pins" onclick="switchTab('pins')">Pins</button>
      <button class="modal-tab" data-tab="export" onclick="switchTab('export')">Export</button>
    </div>
    <div class="modal-body">
      <div class="tab-content active" id="tab-appearance">
        <div class="section-label">Circle color</div>
        <div class="color-options" id="color-options"></div>
        <div class="opacity-row" style="margin-top:16px;">
          <span class="opacity-label">Fill opacity</span>
          <input type="range" id="opacity-slider" min="0" max="40" step="1" value="15" style="flex:1;">
          <span style="font-family:'DM Mono',monospace;font-size:12px;color:var(--muted);width:30px;text-align:right;" id="opacity-val">15%</span>
        </div>
      </div>
      <div class="tab-content" id="tab-pins">
        <button class="export-btn" onclick="pinCurrent()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z"/></svg>
          Pin this location
        </button>
        <div id="pin-list" class="pin-list"></div>
      </div>
      <div class="tab-content" id="tab-export">
        <button class="export-btn" onclick="copyShareLink()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.9 12c0-1.71 1.39-3.1 3.1-3.1h4V7H7a5 5 0 0 0 0 10h4v-1.9H7c-1.71 0-3.1-1.39-3.1-3.1zM8 13h8v-2H8v2zm9-6h-4v1.9h4c1.71 0 3.1 1.39 3.1 3.1s-1.39 3.1-3.1 3.1h-4V17h4a5 5 0 0 0 0-10z"/></svg>
          Copy share link
        </button>
        <button class="export-btn" onclick="copyCoords()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
          Copy coordinates
        </button>
        <button class="export-btn" onclick="savePNG()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/></svg>
          Save as PNG
        </button>
        <button class="export-btn" onclick="exportData()">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          Download as JSON
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-image/0.4.0/leaflet-image.min.js"></script>
<script src="app.js" defer></script>
</body>
</html>
